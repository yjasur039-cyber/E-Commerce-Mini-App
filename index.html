<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCalc - Dinamik Hisoblagich</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .calc-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 30px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h2 {
            text-align: center;
            margin-top: 0;
            color: #38bdf8;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: #38bdf8;
        }
        .result-section {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #334155;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 15px;
        }
        .result-row:last-child {
            margin-bottom: 0;
            padding-top: 10px;
            border-top: 1px dashed #334155;
            font-weight: bold;
            color: #34d399;
        }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>NexCalc</h2>
    
    <div class="input-group">
        <label for="amount">Kiritilayotgan qiymat (Uzs):</label>
        <input type="number" id="amount" placeholder="0.00" oninput="calculateValues()">
    </div>

    <div class="result-section">
        <div class="result-row">
            <span>Kiritilgan xizmat:</span>
            <span id="out-amount">0 so'm</span>
        </div>
        <div class="result-row">
            <span>Fiksirlangan yig'im (Komissiya):</span>
            <span id="out-commission">0 so'm</span>
        </div>
        <div class="result-row">
            <span>Jami hisob:</span>
            <span id="out-total">0 so'm</span>
        </div>
    </div>
</div>

<script>
    // Dinamik hisob-kitob funksiyasi
    function calculateValues() {
        // Input ichidagi qiymatni olish
        const inputField = document.getElementById("amount");
        const rawValue = inputField.value;
        
        // Matnni songa o'tkazish
        const amount = parseFloat(rawValue);
        
        // Fiksirlangan komissiya miqdori (100 so'm)
        const fixedCommission = 100;

        // Ekranga chiqaruvchi elementlarni olish
        const outAmount = document.getElementById("out-amount");
        const outCommission = document.getElementById("out-commission");
        const outTotal = document.getElementById("out-total");

        // Input bo'sh yoki noto'g'ri qiymat bo'lsa, nolga tenglash
        if (isNaN(amount) || amount <= 0) {
            outAmount.innerText = "0 so'm";
            outCommission.innerText = "0 so'm";
            outTotal.innerText = "0 so'm";
            return;
        }

        // Matematik amal (Summa + Komissiya)
        const totalSum = amount + fixedCommission;

        // Natijalarni real vaqtda formatlab ekranga chiqarish
        outAmount.innerText = amount.toLocaleString() + " so'm";
        outCommission.innerText = fixedCommission + " so'm";
        outTotal.innerText = totalSum.toLocaleString() + " so'm";
    }
</script>

</body>
</html>
