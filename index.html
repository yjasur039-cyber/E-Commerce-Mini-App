<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Mini App</title>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: #111424; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #1c2038; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box;
        }
        .lang-switcher { 
            text-align: right; 
            margin-bottom: 20px; 
        }
        .lang-btn { 
            background: none; 
            border: none; 
            color: #888; 
            cursor: pointer; 
            font-weight: bold; 
            margin-left: 10px; 
            font-size: 14px;
        }
        .lang-btn.active { 
            color: #2481cc; 
            border-bottom: 2px solid #2481cc;
        }
        h2 { 
            color: white; 
            text-align: center; 
            margin-top: 0;
            margin-bottom: 25px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            color: #ccc; 
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            background: #2d325a; 
            border: 1px solid #3d437a; 
            border-radius: 6px; 
            color: white; 
            box-sizing: border-box; 
            font-size: 15px;
        }
        input::placeholder {
            color: #777;
        }
        button.submit-btn { 
            width: 100%; 
            padding: 14px; 
            background-color: #2481cc; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            margin-top: 10px;
        }
        button.submit-btn:hover { 
            background-color: #1a6fa6; 
        }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="changeLanguage('uz', this)">UZ</button>
        <button class="lang-btn" onclick="changeLanguage('ru', this)">РУ</button>
        <button class="lang-btn" onclick="changeLanguage('en', this)">EN</button>
    </div>

    <h2 id="page-title">Buyurtma Rasmiylashtirish</h2>
    
    <div class="form-group">
        <label id="label-name" for="name">Ismingiz:</label>
        <input type="text" id="name" placeholder="Ismingizni kiriting">
    </div>
    
    <div class="form-group">
        <label id="label-product" for="product">Mahsulotni tanlang:</label>
        <select id="product">
            <option value="Kurslar to'plami - 100 000 so'm">Dasturlash kursi - 100 000 so'm</option>
            <option value="Kitoblar to'plami - 50 000 so'm">Kitoblar to'plami - 50 000 so'm</option>
        </select>
    </div>
    
    <button class="submit-btn" id="btn-submit" onclick="sendOrder()">Buyurtma berish</button>
</div>

<script src="app.js"></script>
</body>
</html>
