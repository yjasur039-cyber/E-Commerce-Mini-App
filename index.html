<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Language Project</title>
    <style>
        body { font-family: sans-serif; background-color: #111424; color: white; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; background: #1c2038; padding: 20px; border-radius: 12px; }
        .lang-switcher { text-align: right; margin-bottom: 20px; }
        .lang-btn { background: none; border: none; color: #888; cursor: pointer; font-weight: bold; margin-left: 10px; }
        .lang-btn.active { color: #007bff; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #ccc; }
        input { width: 100%; padding: 10px; background: #2d325a; border: 1px solid #3d437a; border-radius: 6px; color: white; box-sizing: border-box; }
        button.submit-btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="changeLanguage('uz', this)">UZ</button>
        <button class="lang-btn" onclick="changeLanguage('ru', this)">РУ</button>
        <button class="lang-btn" onclick="changeLanguage('en', this)">EN</button>
    </div>

    <h3 id="title">Tizimga kirish</h3>
    
    <div class="form-group">
        <label id="label-name" for="username">Foydalanuvchi ismi:</label>
        <input type="text" id="username" placeholder="Ismingizni kiriting">
    </div>

    <button class="submit-btn" id="btn-text">Davom etish</button>
</div>

<script src="lang.js"></script>
</body>
</html>
